<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Development | Portfolio</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="assets/img/logo.ico" rel="icon" />

    <link
      rel="preload"
      as="image"
      href="assets/img/under-development.svg"
      type="image/svg+xml"
      fetchpriority="high"
    />

    <style>
      body {
        /* Matches the dark blue gradient from your portfolio image */
        background: linear-gradient(135deg, #020516 0%, #0a113a 100%);
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        overflow-x: hidden;
      }

      .placeholder-container {
        max-width: 1500px;
        width: 100%;
        padding: 2rem;
        margin-top: -120px;
      }

      .dev-wrapper {
        position: relative;
        width: 100%;
        max-width: 1500px;
        margin: 0 auto;
        display: block;
      }

      .dev-animated {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0; /* Hides the GIF until it is fully loaded */
        transition: opacity 0.4s ease-in-out;
      }

      .info-text {
        font-size: 0.95rem;
        color: #e2e8f0;
        /* Slight off-white for better readability */
        font-weight: 400;
        line-height: 1.5;
      }

      .btn-portfolio {
        background-color: #82bbed;
        /* Matches the light blue in your Canva design */
        color: #010411;
        /* Dark text for contrast */
        font-weight: 600;
        font-size: 0.95rem;
        padding: 0.6rem 1.5rem;
        border-radius: 50px;
        /* Pill shape */
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border: none;
      }

      .btn-portfolio:hover {
        background-color: #6ea4d4;
        color: #010411;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(130, 187, 237, 0.25);
      }

      .bottom-row {
        margin-top: -5rem;
        padding: 0px 150px;
      }

      /* Removed redundant .dev-gif declaration */

      /* Mobile Responsiveness */
      @media (max-width: 991px) {
        .bottom-row {
          margin-top: 2rem;
          padding: 0px 20px;
        }
      }

      /* Mobile Responsiveness */
      @media (max-width: 768px) {
        .bottom-row {
          margin-top: 2rem;
          padding: 0px 0px;
        }

        .info-text {
          text-align: center !important;
          margin-bottom: 1.5rem;
        }

        .btn-portfolio {
          width: 50%;
          justify-content: center;
        }

        .dev-wrapper {
          width: 100%;
          margin: auto auto;
          min-width: 250px;
          display: block;
        }
      }

      /* Mobile Responsiveness */
      @media (max-width: 475px) {
        .btn-portfolio {
          width: 75%;
          justify-content: center;
        }
      }
    </style>
  </head>

  <body>
    <div class="container-fluid placeholder-container">
      <div class="dev-wrapper mb-2">
        <img
          src="assets/img/under-development.svg"
          alt="Under Development..."
          class="img-fluid w-100"
          width="1781"
          height="864"
          fetchpriority="high"
        />
        <img
          src="assets/img/under-development.gif"
          alt="Under Development Animated..."
          class="dev-animated"
          width="1781"
          height="864"
          loading="lazy"
          decoding="async"
          onload="this.style.opacity = '1'"
        />
      </div>

      <div class="row align-items-center bottom-row">
        <div class="col-md-8 text-md-start text-center info-text">
          Compiling better ideas takes a little time; check back soon for the
          deployed version.
        </div>

        <div class="col-md-4 text-md-end text-center mt-3 mt-md-0">
          <a href="index.html" class="btn btn-portfolio">
            <i class="bi bi-arrow-return-left"></i> Back to Portfolio
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
